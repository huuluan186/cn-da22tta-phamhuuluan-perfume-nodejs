name: CI/CD Pipeline - Perfumora

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  SERVER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/perfumora-server
  CLIENT_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/perfumora-client

jobs:
  # ============================
  # JOB 1: Build & Push to Docker Hub
  # ============================
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build & Push SERVER image
        uses: docker/build-push-action@v5
        with:
          context: ./src/server
          file: ./src/server/Dockerfile
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:latest
            ${{ env.SERVER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏗️ Build & Push CLIENT image
        uses: docker/build-push-action@v5
        with:
          context: ./src/client
          file: ./src/client/Dockerfile
          push: true
          build-args: |
            REACT_APP_SERVER_URL=${{ secrets.REACT_APP_SERVER_URL }}
          tags: |
            ${{ env.CLIENT_IMAGE }}:latest
            ${{ env.CLIENT_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================
  # JOB 2: Deploy lên Render.com
  # ============================
  deploy:
    name: Deploy to Render.com
    runs-on: ubuntu-latest
    needs: build-and-push
    # Chỉ deploy khi push lên main (không deploy khi PR)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 🚀 Trigger deploy SERVER trên Render
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK_SERVER }}" \
            -X GET \
            --fail \
            && echo "✅ Server deploy triggered" \
            || echo "⚠️  Server deploy hook not configured"

      - name: 🚀 Trigger deploy CLIENT trên Render
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK_CLIENT }}" \
            -X GET \
            --fail \
            && echo "✅ Client deploy triggered" \
            || echo "⚠️  Client deploy hook not configured"
