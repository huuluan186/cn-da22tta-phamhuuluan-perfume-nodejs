# docker-compose.prod.yml
# Dùng image từ Docker Hub (không build local)
# Chạy: docker-compose -f docker-compose.prod.yml up -d

version: '3.9'
services:
  server:
    image: ${DOCKERHUB_USERNAME}/perfumora-server:latest
    container_name: node_server_perfumora
    restart: always
    ports:
      - "${PORT}:5000"
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      DB_HOST: ${AIVEN_DB_HOST}
      DB_PORT: ${AIVEN_DB_PORT}
      DB_USER: ${AIVEN_DB_USER}
      DB_PASSWORD: ${AIVEN_DB_PASSWORD}
      DB_NAME: ${AIVEN_DB_NAME}
    networks:
      - app-network

  client:
    image: ${DOCKERHUB_USERNAME}/perfumora-client:latest
    container_name: react_client_perfumora
    restart: always
    ports:
      - "${CLIENT_PORT}:80"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
